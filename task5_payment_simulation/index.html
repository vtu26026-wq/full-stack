<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafePay | Transaction Simulation</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="terminal-container">
        <header class="terminal-header">
            <div class="controls">
                <span></span><span></span><span></span>
            </div>
            <div class="title">SafePay Transaction Engine</div>
        </header>

        <section class="wallets">
            <div class="wallet-card user">
                <div class="label">Your Balance (User)</div>
                <div class="amount" id="userBalance">$0.00</div>
            </div>
            <div class="wallet-card merchant">
                <div class="label">Store Balance (Merchant)</div>
                <div class="amount" id="merchantBalance">$0.00</div>
            </div>
        </section>

        <main class="payment-view">
            <div class="payment-card">
                <h2>Authorize Payment</h2>
                <div class="input-container">
                    <span>$</span>
                    <input type="number" id="payAmount" placeholder="0.00" step="0.01">
                </div>
                <p class="hint">Funds will be transferred between accounts using atomic transactions (COMMIT/ROLLBACK).</p>
                <button id="payBtn" class="pay-btn">Process Secure Payment</button>
            </div>
        </main>

        <footer class="console">
            <div class="console-label">System Logs:</div>
            <div id="logs" class="logs-container">
                <div class="log system">System initialized... waiting for transaction.</div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
