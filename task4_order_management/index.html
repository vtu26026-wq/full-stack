<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management | Task 4</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Relational Insights Dashboard</h1>
            <p>Customer Order Analytics powered by Advanced SQL Joins and Subqueries.</p>
        </header>

        <section class="insights-grid">
            <div class="insight-card gold">
                <div class="icon">🏆</div>
                <div class="info">
                    <h3>Highest Value Order</h3>
                    <p id="topOrder">Loading...</p>
                </div>
            </div>
            <div class="insight-card blue">
                <div class="icon">👤</div>
                <div class="info">
                    <h3>Most Active Customer</h3>
                    <p id="topCustomer">Loading...</p>
                </div>
            </div>
        </section>

        <section class="history-section">
            <div class="card">
                <div class="card-header">
                    <h2>Customer Order History</h2>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer Name</th>
                                <th>Product</th>
                                <th>Order Date</th>
                                <th>Total Amount</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            <!-- Data will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
